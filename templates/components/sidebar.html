<!-- Sidebar Overlay -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- Sidebar Drawer -->
<div class="sidebar" id="sidebar">
  <button class="sidebar-close" id="sidebarClose" aria-label="Close menu">✕</button>
  
  <div class="sidebar-header">
    <div class="user-profile-section">
      <div class="user-avatar" id="sidebarAvatar">U</div>
      <div class="user-info">
        <div class="user-name" id="sidebarUserName">Guest User</div>
        <div class="user-handle" id="sidebarUserHandle">Welcome to Dashboard</div>
      </div>
    </div>
  </div>

  <div class="sidebar-body">
    <div class="sidebar-nav-group">
      <span class="sidebar-nav-label">Main Menu</span>
      <nav class="sidebar-nav">
        <a href="/" class="sidebar-link {% if request.path == '/' %}active{% endif %}">
          <span class="link-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.6L3 8l6 4-3 3-3-1v2l4 4 2-1 3-3 4 6h2l-.6-1.8z"/></svg></span> Query
        </a>
        <a href="/itineraries" class="sidebar-link {% if request.path == '/itineraries' %}active{% endif %}">
          <span class="link-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg></span> Itineraries
        </a>
        <a href="/tickets" class="sidebar-link {% if request.path == '/tickets' %}active{% endif %}">
          <span class="link-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></svg></span> Tickets
        </a>
      </nav>
    </div>

    <div class="sidebar-nav-group">
      <span class="sidebar-nav-label">Finance</span>
      <nav class="sidebar-nav">
        <a href="/billing" class="sidebar-link {% if request.path == '/billing' %}active{% endif %}">
          <span class="link-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg></span> Billing
        </a>
        <a href="/ledger" class="sidebar-link {% if request.path == '/ledger' %}active{% endif %}">
          <span class="link-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg></span> Ledger
        </a>
      </nav>
    </div>

    <div class="sidebar-nav-group">
      <span class="sidebar-nav-label">Directory</span>
      <nav class="sidebar-nav">
        <a href="/passengers" class="sidebar-link {% if request.path == '/passengers' %}active{% endif %}">
          <span class="link-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span> Passengers
        </a>
        <a href="/corporates" class="sidebar-link {% if request.path == '/corporates' %}active{% endif %}">
          <span class="link-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg></span> Corporates
        </a>
      </nav>
    </div>
  </div>

  <div class="sidebar-footer">
    <div class="theme-toggles">
      <button class="sidebar-theme-toggle" id="sidebarThemeToggle" aria-label="Toggle Dark Mode">
        <span class="theme-icon-container">🌙</span>
        <span id="themeToggleText">Dark Mode</span>
      </button>
      <button class="sidebar-theme-toggle" id="valentineToggle" aria-label="Toggle Pookie Mode">
        <span class="theme-icon-container">🎀</span>
        <span id="sidebarValToggleText">Pookie Mode</span>
      </button>
    </div>
    <button class="sidebar-auth-btn" id="sidebarAuthBtn" onclick="handleAuthClick()">
      🔐 Login / Register
    </button>
  </div>
</div>
