<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Itinerary Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --primary: #2563eb;
  --primary-dark: #1e40af;
  --secondary: #0ea5e9;
  --success: #10b981;
  --danger: #ef4444;
  --warning: #f59e0b;
  --bg-main: #f8fafc;
  --bg-card: #ffffff;
  --text-primary: #0f172a;
  --text-secondary: #64748b;
  --border: #e2e8f0;
  --shadow: rgba(15, 23, 42, 0.08);
  --shadow-lg: rgba(15, 23, 42, 0.15);
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg-main);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
}

.app-header {
  background: linear-gradient(135deg, #1e40af 0%, #2563eb 50%, #0ea5e9 100%);
  color: white;
  padding: 2rem 1.5rem;
  box-shadow: 0 4px 20px var(--shadow-lg);
}

.header-content {
  max-width: 1200px;
  margin: 0 auto;
}

.header-content h1 {
  font-size: 2rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
  letter-spacing: -0.02em;
}

.header-content p {
  font-size: 1rem;
  opacity: 0.95;
  font-weight: 300;
}

.container {
  max-width: 1200px;
  margin: 2rem auto;
  padding: 0 1.5rem;
}

.section {
  background: var(--bg-card);
  border-radius: 16px;
  padding: 2rem;
  margin-bottom: 1.5rem;
  box-shadow: 0 1px 3px var(--shadow);
  border: 1px solid var(--border);
}

.section-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 1.5rem;
}

.section-header h2 {
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--text-primary);
}

.section-icon {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 1.2rem;
}

.flight-block {
  background: #f8fafc;
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
  margin-bottom: 1rem;
  transition: all 0.3s ease;
  position: relative;
}

.flight-block:hover {
  border-color: var(--primary);
  box-shadow: 0 4px 12px var(--shadow);
}

.flight-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
}

.flight-number {
  font-weight: 600;
  color: var(--primary);
  font-size: 0.95rem;
}

.remove-btn {
  background: #fee2e2;
  color: var(--danger);
  border: none;
  padding: 0.4rem 0.75rem;
  border-radius: 6px;
  font-size: 0.85rem;
  cursor: pointer;
  font-weight: 500;
  transition: all 0.2s ease;
}

.remove-btn:hover {
  background: #fecaca;
  transform: translateY(-1px);
}

.textarea-wrapper {
  margin-bottom: 1.25rem;
}

.textarea-label {
  display: block;
  font-size: 0.875rem;
  font-weight: 500;
  margin-bottom: 0.5rem;
  color: var(--text-secondary);
}

textarea {
  width: 100%;
  min-height: 120px;
  padding: 1rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.875rem;
  border: 2px solid var(--border);
  border-radius: 8px;
  resize: vertical;
  transition: all 0.3s ease;
  background: white;
  color: var(--text-primary);
}

textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

textarea::placeholder {
  color: #94a3b8;
}

.fare-types {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
}

.fare-group {
  flex: 1;
  min-width: 200px;
}

.fare-checkbox {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.5rem;
  cursor: pointer;
  user-select: none;
}

.fare-checkbox input[type="checkbox"] {
  width: 18px;
  height: 18px;
  cursor: pointer;
  accent-color: var(--primary);
}

.fare-checkbox label {
  font-weight: 500;
  font-size: 0.9rem;
  cursor: pointer;
  color: var(--text-primary);
}

.fare-input {
  width: 100%;
  padding: 0.75rem 1rem;
  font-size: 0.95rem;
  border: 2px solid var(--border);
  border-radius: 8px;
  font-family: 'Outfit', sans-serif;
  transition: all 0.3s ease;
  background: white;
}

.fare-input:disabled {
  background: #f1f5f9;
  cursor: not-allowed;
  color: #94a3b8;
}

.fare-input:not(:disabled):focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

.add-flight-btn {
  width: 100%;
  padding: 1rem;
  background: white;
  border: 2px dashed var(--border);
  border-radius: 12px;
  color: var(--primary);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
}

.add-flight-btn:hover {
  border-color: var(--primary);
  background: #eff6ff;
  transform: translateY(-2px);
}

.markup-section {
  display: flex;
  align-items: flex-end;
  gap: 1rem;
}

.input-group {
  flex: 1;
}

.input-label {
  display: block;
  font-size: 0.875rem;
  font-weight: 500;
  margin-bottom: 0.5rem;
  color: var(--text-secondary);
}

.markup-input {
  width: 100%;
  padding: 0.875rem 1rem;
  font-size: 1rem;
  border: 2px solid var(--border);
  border-radius: 8px;
  font-family: 'Outfit', sans-serif;
  transition: all 0.3s ease;
}

.markup-input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

.btn {
  padding: 0.875rem 2rem;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  font-family: 'Outfit', sans-serif;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  white-space: nowrap;
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: white;
  box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
}

.btn-primary:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.btn-secondary {
  background: white;
  color: var(--text-primary);
  border: 2px solid var(--border);
}

.btn-secondary:hover {
  border-color: var(--primary);
  color: var(--primary);
  transform: translateY(-2px);
}

.parse-section {
  text-align: center;
}

.cards-grid {
  display: grid;
  gap: 1rem;
  grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
}

.flight-card {
  background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.flight-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 4px;
  height: 100%;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
}

.flight-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px var(--shadow-lg);
}

.card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 1rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}

.card-airline {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--primary);
  line-height: 1.3;
}

.card-flight-num {
  font-size: 0.85rem;
  color: var(--text-secondary);
  font-weight: 500;
}

.card-route {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 1rem;
  font-size: 0.95rem;
}

.card-city {
  font-weight: 600;
  color: var(--text-primary);
}

.card-time {
  font-size: 0.85rem;
  color: var(--text-secondary);
}

.card-arrow {
  color: var(--primary);
  font-weight: 700;
}

.card-details {
  display: grid;
  gap: 0.5rem;
  margin-bottom: 1rem;
  font-size: 0.875rem;
}

.card-detail-item {
  display: flex;
  justify-content: space-between;
  color: var(--text-secondary);
}

.card-detail-label {
  font-weight: 500;
}

.card-detail-value {
  font-weight: 600;
  color: var(--text-primary);
}

.card-fares {
  background: #f8fafc;
  border-radius: 8px;
  padding: 1rem;
  margin-top: 1rem;
}

.card-fare-title {
  font-size: 0.75rem;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 0.5rem;
  letter-spacing: 0.05em;
}

.fare-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.5rem;
}

.fare-item:last-child {
  margin-bottom: 0;
}

.fare-label {
  font-weight: 500;
  color: var(--text-primary);
  font-size: 0.9rem;
}

.fare-value {
  font-weight: 700;
  color: var(--primary);
  font-size: 1.1rem;
}

.output-section {
  background: #0f172a;
  color: #e2e8f0;
  padding: 1.5rem;
  border-radius: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.875rem;
  line-height: 1.8;
  white-space: pre-wrap;
  max-height: 600px;
  overflow-y: auto;
  border: 2px solid #1e293b;
}

.output-section::-webkit-scrollbar {
  width: 8px;
}

.output-section::-webkit-scrollbar-track {
  background: #1e293b;
  border-radius: 4px;
}

.output-section::-webkit-scrollbar-thumb {
  background: #475569;
  border-radius: 4px;
}

.output-section::-webkit-scrollbar-thumb:hover {
  background: #64748b;
}

.empty-state {
  text-align: center;
  padding: 3rem;
  color: var(--text-secondary);
}

.empty-state-icon {
  font-size: 3rem;
  margin-bottom: 1rem;
  opacity: 0.5;
}

.empty-state-text {
  font-size: 1.1rem;
  font-weight: 500;
}

.actions {
  display: flex;
  gap: 1rem;
  margin-top: 1rem;
  flex-wrap: wrap;
}

.loading {
  display: inline-block;
  width: 18px;
  height: 18px;
  border: 3px solid rgba(255, 255, 255, 0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.notification {
  position: fixed;
  top: 2rem;
  right: 2rem;
  background: white;
  padding: 1rem 1.5rem;
  border-radius: 8px;
  box-shadow: 0 8px 24px var(--shadow-lg);
  border-left: 4px solid var(--success);
  display: flex;
  align-items: center;
  gap: 0.75rem;
  z-index: 1000;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from {
    transform: translateX(400px);
    opacity: 0;
  }
  to {
    transform: translateX(0);
    opacity: 1;
  }
}

.notification.error {
  border-left-color: var(--danger);
}

.notification.warning {
  border-left-color: var(--warning);
}

@media (max-width: 768px) {
  .container {
    padding: 0 1rem;
    margin: 1rem auto;
  }

  .section {
    padding: 1.5rem;
  }

  .fare-types {
    flex-direction: column;
  }

  .cards-grid {
    grid-template-columns: 1fr;
  }

  .markup-section {
    flex-direction: column;
    align-items: stretch;
  }

  .actions {
    flex-direction: column;
  }

  .btn {
    width: 100%;
    justify-content: center;
  }
}
</style>
</head>
<body>

<div class="app-header">
  <div class="header-content">
    <h1>✈️ Flight Itinerary Builder</h1>
    <p>Paste flight details → Select fares → Generate professional itinerary</p>
  </div>
</div>

<div class="container">
  <!-- Flight Inputs Section -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon">✈️</div>
      <h2>Flight Details</h2>
    </div>
    <div id="flightInputs"></div>
    <button class="add-flight-btn" onclick="addFlight()">
      <span>➕</span>
      <span>Add Another Flight</span>
    </button>
  </div>

  <!-- Markup Section -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon">💰</div>
      <h2>Markup Configuration</h2>
    </div>
    <div class="markup-section">
      <div class="input-group">
        <label class="input-label">Global Markup (₹)</label>
        <input type="number" id="markup" class="markup-input" placeholder="Enter markup amount (e.g., 500)" min="0">
      </div>
    </div>
  </div>

  <!-- Parse Button -->
  <div class="section parse-section">
    <button class="btn btn-primary" id="parseBtn" onclick="parseFlights()">
      <span id="parseIcon">🚀</span>
      <span id="parseBtnText">Parse Flights & Generate Itinerary</span>
    </button>
  </div>

  <!-- Flight Cards Section -->
  <div class="section" id="cardsSection" style="display: none;">
    <div class="section-header">
      <div class="section-icon">🎫</div>
      <h2>Flight Cards</h2>
    </div>
    <div id="cards" class="cards-grid"></div>
    <div class="actions">
      <button class="btn btn-secondary" onclick="shareCardsAsImage()">
        📤 Download & Share Cards on WhatsApp
      </button>
    </div>
  </div>

  <!-- Output Section -->
  <div class="section" id="outputSection" style="display: none;">
    <div class="section-header">
      <div class="section-icon">📋</div>
      <h2>Final Itinerary Text</h2>
    </div>
    <div id="output" class="output-section">No output yet.</div>
    <div class="actions">
      <button class="btn btn-primary" onclick="copyOutput()">
        📋 Copy to Clipboard
      </button>
      <button class="btn btn-secondary" onclick="shareOnWhatsApp()">
        📤 Share on WhatsApp
      </button>
    </div>
  </div>
</div>

<script>
let flightCount = 0;
let isParsing = false;

function addFlight() {
  flightCount++;
  const div = document.createElement("div");
  div.className = "flight-block";
  div.dataset.flightId = flightCount;
  div.innerHTML = `
    <div class="flight-header">
      <span class="flight-number">Flight #${flightCount}</span>
      ${flightCount > 1 ? '<button class="remove-btn" onclick="removeFlight(this)">🗑️ Remove</button>' : ''}
    </div>
    
    <div class="textarea-wrapper">
      <label class="textarea-label">Paste Flight Details (include price if available)</label>
      <textarea placeholder="Paste complete flight information here...
Example: 
Airline: IndiGo
Flight: 6E-123
Departure: Mumbai (BOM) - 10:30 AM
Arrival: Delhi (DEL) - 12:45 PM
Date: 28 Jan 2026
Duration: 2h 15m
Stops: Non-stop
Baggage: 15 Kg
Refundable
Price: ₹5,500

The price will be automatically extracted as Saver Fare"></textarea>
    </div>

    <div class="fare-types">
      <div class="fare-group">
        <div class="fare-checkbox">
          <input type="checkbox" id="saver-${flightCount}" onchange="toggleFare(this, 'saver', ${flightCount})" checked>
          <label for="saver-${flightCount}">Saver Fare (auto-extracted or manual)</label>
        </div>
        <input type="number" class="fare-input fare-saver-${flightCount}" placeholder="Auto-filled from text or enter manually" min="0">
      </div>

      <div class="fare-group">
        <div class="fare-checkbox">
          <input type="checkbox" id="corporate-${flightCount}" onchange="toggleFare(this, 'corporate', ${flightCount})">
          <label for="corporate-${flightCount}">Corporate Fare</label>
        </div>
        <input type="number" class="fare-input fare-corporate-${flightCount}" placeholder="₹ 0" min="0" disabled>
      </div>

      <div class="fare-group">
        <div class="fare-checkbox">
          <input type="checkbox" id="sme-${flightCount}" onchange="toggleFare(this, 'sme', ${flightCount})">
          <label for="sme-${flightCount}">SME Fare</label>
        </div>
        <input type="number" class="fare-input fare-sme-${flightCount}" placeholder="₹ 0" min="0" disabled>
      </div>
    </div>
  `;
  document.getElementById("flightInputs").appendChild(div);
}

function removeFlight(btn) {
  btn.closest('.flight-block').remove();
  renumberFlights();
}

function renumberFlights() {
  const blocks = document.querySelectorAll('.flight-block');
  blocks.forEach((block, index) => {
    const number = index + 1;
    block.querySelector('.flight-number').textContent = `Flight #${number}`;
  });
}

function toggleFare(checkbox, fareType, flightId) {
  const input = document.querySelector(`.fare-${fareType}-${flightId}`);
  input.disabled = !checkbox.checked;
  if (!checkbox.checked) {
    input.value = '';
  }
}

function showNotification(message, type = 'success') {
  const notification = document.createElement('div');
  notification.className = `notification ${type}`;
  notification.innerHTML = `
    <span>${type === 'error' ? '❌' : type === 'warning' ? '⚠️' : '✅'}</span>
    <span>${message}</span>
  `;
  document.body.appendChild(notification);
  
  setTimeout(() => {
    notification.style.animation = 'slideIn 0.3s ease reverse';
    setTimeout(() => notification.remove(), 300);
  }, 3000);
}

async function parseFlights() {
  if (isParsing) {
    showNotification('Parsing already in progress', 'warning');
    return;
  }

  const blocks = document.querySelectorAll(".flight-block");
  const flights = [];
  const markup = document.getElementById("markup").value.trim();

  // Validation
  if (!markup || markup === '' || Number(markup) < 0) {
    showNotification('Please enter a valid markup amount', 'error');
    document.getElementById("markup").focus();
    return;
  }

  let hasError = false;
  let emptyFlightFound = false;

  blocks.forEach((block, index) => {
    const text = block.querySelector("textarea").value.trim();
    
    if (!text) {
      emptyFlightFound = true;
      return;
    }

    const flightId = block.dataset.flightId;
    const fares = {};
    let fareSelected = false;

    ['saver', 'corporate', 'sme'].forEach(fareType => {
      const checkbox = document.getElementById(`${fareType}-${flightId}`);
      const input = document.querySelector(`.fare-${fareType}-${flightId}`);
      
      if (checkbox.checked) {
        fareSelected = true;
        
        // For saver fare, it's okay if empty (will be extracted from text)
        // For other fares, user must enter manually
        if (fareType === 'saver') {
          // If user entered a value, use it. Otherwise, it will be extracted by AI
          if (input.value && input.value.trim() !== '') {
            fares[fareType] = Number(input.value);
          }
          // If empty, don't add to fares object - let backend handle extraction
        } else {
          // Corporate and SME must have values if checked
          if (!input.value || input.value.trim() === '' || Number(input.value) < 0) {
            showNotification(`Please enter ${fareType} fare for Flight #${index + 1}`, 'error');
            input.focus();
            hasError = true;
          } else {
            fares[fareType] = Number(input.value);
          }
        }
      }
    });

    if (!fareSelected) {
      showNotification(`Please select at least one fare type for Flight #${index + 1}`, 'error');
      hasError = true;
    }

    if (!hasError) {
      flights.push({
        text: text,
        fares: fares
      });
    }
  });

  if (emptyFlightFound && flights.length === 0) {
    showNotification('Please paste at least one flight detail', 'error');
    return;
  }

  if (hasError || flights.length === 0) {
    return;
  }

  // Start parsing
  isParsing = true;
  const parseBtn = document.getElementById('parseBtn');
  const parseIcon = document.getElementById('parseIcon');
  const parseBtnText = document.getElementById('parseBtnText');
  
  parseBtn.disabled = true;
  parseIcon.innerHTML = '<span class="loading"></span>';
  parseBtnText.textContent = 'Processing...';

  document.getElementById("cards").innerHTML = '';
  document.getElementById("cardsSection").style.display = 'none';
  document.getElementById("outputSection").style.display = 'none';

  try {
    const response = await fetch("/parse", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        flights: flights.map(f => f.text),
        fares: flights.map(f => f.fares),
        markup: Number(markup)
      })
    });

    const data = await response.json();
    
    if (!response.ok) {
      // Show specific error from backend
      showNotification(data.error || 'Failed to parse flights', 'error');
      return;
    }
    
    // Update the saver fare inputs with extracted values if any
    data.flights.forEach((flight, index) => {
      if (flight.fares && flight.fares.saver) {
        const block = blocks[index];
        if (block) {
          const flightId = block.dataset.flightId;
          const saverInput = document.querySelector(`.fare-saver-${flightId}`);
          // Only update if it was empty (user didn't manually enter)
          if (saverInput && (!saverInput.value || saverInput.value.trim() === '')) {
            saverInput.value = flight.fares.saver;
          }
        }
      }
    });
    
    renderResults(data.flights);
    showNotification('Flights parsed successfully!', 'success');
    
  } catch (error) {
    showNotification('Error parsing flights. Please try again.', 'error');
    console.error(error);
  } finally {
    isParsing = false;
    parseBtn.disabled = false;
    parseIcon.innerHTML = '🚀';
    parseBtnText.textContent = 'Parse Flights & Generate Itinerary';
  }
}

function renderResults(flights) {
  if (!flights || flights.length === 0) {
    return;
  }

  // Show sections
  document.getElementById("cardsSection").style.display = 'block';
  document.getElementById("outputSection").style.display = 'block';

  // Render cards
  const cardsContainer = document.getElementById("cards");
  cardsContainer.innerHTML = '';

  flights.forEach((flight, index) => {
    const card = document.createElement('div');
    card.className = 'flight-card';
    
    let faresHTML = '';
    Object.entries(flight.fares).forEach(([type, base]) => {
      const finalFare = base + flight.markup;
      faresHTML += `
        <div class="fare-item">
          <span class="fare-label">${type.charAt(0).toUpperCase() + type.slice(1)}</span>
          <span class="fare-value">₹ ${finalFare.toLocaleString('en-IN')}</span>
        </div>
      `;
    });

    card.innerHTML = `
      <div class="card-header">
        <div>
          <div class="card-airline">${flight.airline}</div>
          <div class="card-flight-num">${flight.flight_number}</div>
        </div>
      </div>
      
      <div class="card-route">
        <div>
          <div class="card-city">${flight.departure_city}</div>
          <div class="card-time">${flight.departure_time}</div>
        </div>
        <span class="card-arrow">→</span>
        <div>
          <div class="card-city">${flight.arrival_city}</div>
          <div class="card-time">${flight.arrival_time}</div>
        </div>
      </div>

      <div class="card-details">
        <div class="card-detail-item">
          <span class="card-detail-label">Duration:</span>
          <span class="card-detail-value">${flight.duration}</span>
        </div>
        <div class="card-detail-item">
          <span class="card-detail-label">Stops:</span>
          <span class="card-detail-value">${flight.stops}</span>
        </div>
        <div class="card-detail-item">
          <span class="card-detail-label">Baggage:</span>
          <span class="card-detail-value">${flight.baggage}</span>
        </div>
      </div>

      <div class="card-fares">
        <div class="card-fare-title">Available Fares</div>
        ${faresHTML}
      </div>
    `;
    
    cardsContainer.appendChild(card);
  });

  // Render output text
  let output = `Your Flight Itinerary for Oneway Air Travel for 1 Traveller(s):\n\n`;

  flights.forEach((flight, index) => {
    let fareLines = '';
    Object.entries(flight.fares).forEach(([type, base]) => {
      const finalFare = base + flight.markup;
      fareLines += `*${type.charAt(0).toUpperCase() + type.slice(1)} Fare:* ₹ ${finalFare.toLocaleString('en-IN')}\n`;
    });

    output += `*${index + 1}. ${flight.airline} : ${flight.flight_number}*

*Departure:* ${flight.departure_city} (${flight.departure_airport})
*Time:* ${flight.departure_date} , ${flight.departure_time}

*Arrival:* ${flight.arrival_city} (${flight.arrival_airport})
*Time:* ${flight.departure_date} , ${flight.arrival_time}

*Duration:* ${flight.duration} (${flight.stops})

*Baggage:* ${flight.baggage}
*${flight.refundability}*

${fareLines}

`;
  });

  output += `Please confirm the same at the earliest. 

Contact: +919831020012
Email: mail@timetours.in

Thanks,
Time Travels

*Note:* Airline ticket pricing is dynamic. Fares are valid as of now and might change at the time of issuance.`;

  document.getElementById("output").textContent = output.trim();

  // Scroll to results
  document.getElementById("cardsSection").scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function copyOutput() {
  const output = document.getElementById("output").textContent;
  navigator.clipboard.writeText(output).then(() => {
    showNotification('Copied to clipboard!', 'success');
  }).catch(() => {
    showNotification('Failed to copy', 'error');
  });
}

function shareOnWhatsApp() {
  const output = document.getElementById("output").textContent;
  const encodedText = encodeURIComponent(output);
  const whatsappUrl = `https://wa.me/?text=${encodedText}`;
  window.open(whatsappUrl, '_blank');
}

function shareCardsAsImage() {
  showNotification('Generating image... This may take a moment', 'warning');
  
  // Use html2canvas library to capture cards
  const cardsContainer = document.getElementById('cards');
  
  // Check if html2canvas is loaded
  if (typeof html2canvas === 'undefined') {
    // Load html2canvas dynamically
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    script.onload = () => captureAndShare();
    document.head.appendChild(script);
  } else {
    captureAndShare();
  }
}

function captureAndShare() {
  const cardsContainer = document.getElementById('cards');
  
  html2canvas(cardsContainer, {
    backgroundColor: '#f8fafc',
    scale: 2,
    logging: false,
    useCORS: true
  }).then(canvas => {
    canvas.toBlob(blob => {
      const file = new File([blob], 'flight-cards.png', { type: 'image/png' });
      
      // Try native Web Share API first (works on mobile)
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({
          files: [file],
          title: 'Flight Itinerary Cards',
          text: 'Check out these flight options!'
        }).then(() => {
          showNotification('Shared successfully!', 'success');
        }).catch((error) => {
          // If user cancels, try WhatsApp fallback
          if (error.name !== 'AbortError') {
            shareToWhatsAppWeb(blob);
          }
        });
      } else {
        // Fallback: Try WhatsApp Web/Mobile
        shareToWhatsAppWeb(blob);
      }
    }, 'image/png');
  }).catch((error) => {
    showNotification('Failed to generate image', 'error');
    console.error('Screenshot error:', error);
  });
}

function shareToWhatsAppWeb(blob) {
  // For desktop: Download file and provide instructions
  // For mobile: Try to open WhatsApp with message
  
  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  
  if (isMobile) {
    // On mobile, we can't directly attach images to WhatsApp Web URL
    // So we save to device and show instructions
    downloadImageWithInstructions(blob);
  } else {
    // On desktop, download and show instructions
    downloadImageWithInstructions(blob);
  }
}

function downloadImageWithInstructions(blob) {
  // Create download link
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `flight-cards-${Date.now()}.png`;
  link.click();
  URL.revokeObjectURL(url);
  
  // Try to copy a helpful message to clipboard
  const helperText = "Flight options attached 👆\n\nPlease let me know which option works best for you!";
  navigator.clipboard.writeText(helperText).catch(() => {
    // Clipboard copy failed, that's okay
  });
  
  // Show instructions in a custom modal
  showWhatsAppInstructions();
}

function showWhatsAppInstructions() {
  // Create modal overlay
  const modal = document.createElement('div');
  modal.style.cssText = `
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
    animation: fadeIn 0.3s ease;
  `;
  
  const modalContent = document.createElement('div');
  modalContent.style.cssText = `
    background: white;
    border-radius: 16px;
    padding: 2rem;
    max-width: 500px;
    margin: 1rem;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    animation: slideUp 0.3s ease;
  `;
  
  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  
  modalContent.innerHTML = `
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideUp {
        from { transform: translateY(50px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
    </style>
    <div style="text-align: center;">
      <div style="font-size: 3rem; margin-bottom: 1rem;">✅</div>
      <h2 style="margin-bottom: 1rem; color: #0f172a;">Image Downloaded!</h2>
      <p style="color: #64748b; margin-bottom: 0.5rem; line-height: 1.6;">
        ${isMobile ? 
          'The flight cards image has been saved to your device.' : 
          'The flight cards image has been downloaded to your computer.'}
      </p>
      <p style="color: #10b981; margin-bottom: 1.5rem; font-weight: 500; font-size: 0.9rem;">
        📋 Message copied to clipboard!
      </p>
      
      <div style="background: #f8fafc; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; text-align: left;">
        <h3 style="font-size: 0.9rem; color: #0f172a; margin-bottom: 1rem; font-weight: 600;">📱 To Share on WhatsApp:</h3>
        <ol style="color: #475569; line-height: 1.8; padding-left: 1.2rem; margin: 0;">
          <li>Open WhatsApp</li>
          <li>Select the contact or group</li>
          <li>Click the attachment (📎) icon</li>
          <li>Choose "Gallery" or "Photos"</li>
          <li>Select the downloaded image</li>
          <li>Paste the copied message (optional)</li>
          <li>Send! 🚀</li>
        </ol>
      </div>
      
      <button onclick="this.parentElement.parentElement.parentElement.remove()" 
        style="background: linear-gradient(135deg, #2563eb, #0ea5e9); color: white; border: none; padding: 0.875rem 2rem; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; transition: transform 0.2s ease;">
        Got It!
      </button>
      
      <button onclick="openWhatsAppDirect(); this.parentElement.parentElement.parentElement.remove();" 
        style="background: #25D366; color: white; border: none; padding: 0.875rem 2rem; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; margin-top: 0.5rem; transition: transform 0.2s ease;">
        📱 Open WhatsApp Now
      </button>
    </div>
  `;
  
  modal.appendChild(modalContent);
  document.body.appendChild(modal);
  
  // Close on background click
  modal.addEventListener('click', (e) => {
    if (e.target === modal) {
      modal.remove();
    }
  });
  
  // Add hover effects
  const buttons = modalContent.querySelectorAll('button');
  buttons.forEach(btn => {
    btn.addEventListener('mouseenter', () => {
      btn.style.transform = 'translateY(-2px)';
    });
    btn.addEventListener('mouseleave', () => {
      btn.style.transform = 'translateY(0)';
    });
  });
  
  showNotification('Image ready! Follow the instructions to share', 'success');
}

function openWhatsAppDirect() {
  // Open WhatsApp (user will need to manually attach the downloaded image)
  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  
  if (isMobile) {
    // Mobile: Open WhatsApp app
    window.open('whatsapp://send', '_blank');
  } else {
    // Desktop: Open WhatsApp Web
    window.open('https://web.whatsapp.com', '_blank');
  }
}

addFlight();
