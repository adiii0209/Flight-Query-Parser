<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ledger | Flight Manager</title>
    <meta name="description" content="Aggregator ledger dashboard for managing airline billing entries.">
    <link rel="icon" type="image/png" href="/static/ticket-flight.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/itineraries.css">
    <link rel="stylesheet" href="/static/dashboard.css">
    <style>
        /* ===== LEDGER SPECIFIC STYLES ===== */
        .ledger-tabs {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.5rem 0;
            overflow-x: auto;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .ledger-tab {
            padding: 0.5rem 1.1rem;
            border: 1px solid var(--border-light);
            border-radius: 10px 10px 0 0;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-fast);
            white-space: nowrap;
            position: relative;
        }

        .ledger-tab:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .ledger-tab.active {
            background: var(--bg-card);
            color: var(--accent-primary);
            border-bottom-color: var(--bg-card);
            font-weight: 600;
            box-shadow: 0 -2px 0 var(--accent-primary) inset;
        }

        .ledger-tab .tab-close {
            margin-left: 0.5rem;
            font-size: 0.75rem;
            opacity: 0.5;
            cursor: pointer;
        }

        .ledger-tab .tab-close:hover {
            opacity: 1;
            color: var(--accent-danger);
        }

        .add-tab-btn {
            padding: 0.5rem 0.9rem;
            border: 1px dashed var(--border-medium);
            border-radius: 10px 10px 0 0;
            background: transparent;
            color: var(--text-tertiary);
            font-family: inherit;
            font-size: 0.88rem;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .add-tab-btn:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            background: var(--accent-primary-light);
        }

        /* ===== SPREADSHEET TABLE ===== */
        .sheet-wrapper {
            overflow-x: auto;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            background: var(--bg-card);
        }

        .sheet-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            min-width: 1600px;
        }

        .sheet-table th {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 0.55rem 0.5rem;
            border: 1px solid var(--border-light);
            position: sticky;
            top: 0;
            z-index: 2;
            white-space: nowrap;
            text-align: center;
        }

        .sheet-table td {
            padding: 0;
            border: 1px solid var(--border-light);
            height: 32px;
            vertical-align: middle;
        }

        .sheet-table tr:hover td {
            background: var(--accent-primary-light) !important;
        }

        .sheet-table tr:nth-child(even) td {
            background: var(--bg-tertiary);
        }

        .sheet-table tr:nth-child(odd) td {
            background: var(--bg-card);
        }

        .sheet-table td input,
        .sheet-table td select {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 0.8rem;
            padding: 0.35rem 0.4rem;
            color: var(--text-primary);
            text-align: center;
            outline: none;
        }

        .sheet-table td input:focus,
        .sheet-table td select:focus {
            background: var(--accent-primary-light);
            box-shadow: inset 0 0 0 2px var(--accent-primary);
        }

        .sheet-table td input[type="number"] {
            -moz-appearance: textfield;
            appearance: textfield;
            text-align: right;
            padding-right: 0.6rem;
        }

        .sheet-table td input::-webkit-outer-spin-button,
        .sheet-table td input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            appearance: none;
        }

        .sheet-table .col-sr {
            width: 35px;
            text-align: center;
            font-weight: 600;
            color: var(--text-tertiary);
            font-size: 0.75rem;
        }

        .sheet-table .col-actions {
            width: 40px;
            text-align: center;
        }

        .row-delete-btn {
            border: none;
            background: transparent;
            color: var(--text-tertiary);
            cursor: pointer;
            font-size: 0.85rem;
            padding: 4px;
            border-radius: 4px;
            transition: var(--transition-fast);
        }

        .row-delete-btn:hover {
            background: var(--accent-danger-light);
            color: var(--accent-danger);
        }

        /* Computed columns (readonly) */
        .computed {
            font-weight: 600;
            color: var(--accent-primary) !important;
            background: transparent !important;
            cursor: default;
        }

        .balance-positive {
            color: var(--accent-success) !important;
        }

        .balance-negative {
            color: var(--accent-danger) !important;
        }

        .sheet-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            border-top: 1px solid var(--border-light);
            background: var(--bg-tertiary);
            border-radius: 0 0 var(--radius-md) var(--radius-md);
        }

        .add-row-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.45rem 1rem;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .add-row-btn:hover {
            background: var(--accent-primary-hover);
        }

        .sheet-stats {
            font-size: 0.82rem;
            color: var(--text-secondary);
        }

        .sheet-stats strong {
            color: var(--text-primary);
        }

        .empty-sheet {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-tertiary);
        }

        .empty-sheet .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .empty-sheet p {
            font-size: 1rem;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 0.88rem;
            font-weight: 500;
            color: white;
            box-shadow: var(--shadow-lg);
            animation: slideInToast 0.3s ease;
        }

        .toast.success {
            background: var(--accent-success);
        }

        .toast.error {
            background: var(--accent-danger);
        }

        .toast.info {
            background: var(--accent-info);
        }

        @keyframes slideInToast {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Drawer Sidebar -->
    <aside class="sidebar" id="sidebar">
        <button class="sidebar-close" id="sidebarClose">✕</button>
        <div class="sidebar-header">
            <div class="user-profile-section">
                <div class="user-avatar" id="sidebarAvatar">?</div>
                <div>
                    <div class="user-name" id="sidebarUserName">User</div>
                    <div class="user-email" id="sidebarUserEmail">member</div>
                </div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="sidebar-link">✈️ Flight Parser</a>
            <a href="/itineraries" class="sidebar-link">📋 Itineraries</a>
            <a href="/billing" class="sidebar-link">💰 Billing</a>
            <a href="/tickets" class="sidebar-link">🎫 Tickets</a>
            <a href="/ledger" class="sidebar-link active">📒 Ledger</a>
            <div class="sidebar-divider"></div>
            <a href="/passengers" class="sidebar-link">👥 Passengers</a>
            <a href="/corporates" class="sidebar-link">🏢 Corporates</a>
        </nav>
        <div class="sidebar-footer">
            <button class="sidebar-theme-toggle" id="sidebarThemeToggle">
                <span class="theme-icon-container">🌙</span>
                <span id="themeToggleText">Dark Mode</span>
            </button>
            <button class="sidebar-auth-btn" id="sidebarAuthBtn" onclick="handleAuthClick()">🔑 Login</button>
        </div>
    </aside>

    <!-- Top Header -->
    <header class="top-header">
        <button class="menu-toggle" id="menuToggle">☰</button>
        <div class="header-content">
            <h1>📒 Aggregator Ledger</h1>
            <p>Manage airline aggregator billing entries</p>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container" style="max-width:1800px; margin:0 auto; padding:1.5rem;">

        <!-- Aggregator Tabs & Balance -->
        <div
            style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; flex-wrap:wrap; gap:1rem;">
            <div class="ledger-tabs" id="ledgerTabs" style="margin-bottom:0; flex:1;">
                <!-- Tabs are rendered by JS -->
            </div>
            <div id="topBalanceDisplay"
                style="font-size:1.8rem; font-weight:700; padding:0.5rem 1.25rem; background:var(--bg-card); border-radius:12px; border:1px solid var(--border-light); display:none; min-width:180px; text-align:right;">
                <span
                    style="font-size:0.75rem; color:var(--text-secondary); display:block; text-transform:uppercase; letter-spacing:1px; margin-bottom:2px;">Running
                    Balance</span>
                <span id="topBalanceAmount" style="color:var(--text-primary);">0.00</span>
            </div>
        </div>

        <!-- Sheet Content -->
        <div id="sheetArea">
            <div class="empty-sheet">
                <div class="icon">📒</div>
                <p>Create an aggregator to get started</p>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ==================== STATE ====================
        let aggregators = [];
        let activeAggId = null;
        let entries = [];
        let saveTimer = null;

        // ==================== AUTH & SIDEBAR ====================
        function initializeSidebar() {
            const toggle = document.getElementById('menuToggle');
            const close = document.getElementById('sidebarClose');
            const overlay = document.getElementById('sidebarOverlay');
            const sidebar = document.getElementById('sidebar');
            const open = () => { sidebar.classList.add('active'); overlay.classList.add('active'); };
            const shut = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); };
            toggle.addEventListener('click', open);
            close.addEventListener('click', shut);
            overlay.addEventListener('click', shut);

            // Theme
            const themeBtn = document.getElementById('sidebarThemeToggle');
            const saved = localStorage.getItem('theme');
            if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            updateThemeUI();
            themeBtn.addEventListener('click', () => {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
                localStorage.setItem('theme', isDark ? 'light' : 'dark');
                updateThemeUI();
            });
        }
        function updateThemeUI() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const icon = document.querySelector('.theme-icon-container');
            const text = document.getElementById('themeToggleText');
            if (icon) icon.textContent = isDark ? '☀️' : '🌙';
            if (text) text.textContent = isDark ? 'Light Mode' : 'Dark Mode';
        }

        async function checkAuth() {
            try {
                const r = await fetch('/api/user');
                if (!r.ok) { window.location.href = '/login?next=/ledger'; return; }
                const u = await r.json();
                document.getElementById('sidebarUserName').textContent = u.full_name || u.username;
                document.getElementById('sidebarUserEmail').textContent = u.email || '';
                document.getElementById('sidebarAvatar').textContent = (u.full_name || u.username || '?')[0].toUpperCase();
                document.getElementById('sidebarAuthBtn').textContent = '🚪 Logout';
                document.getElementById('sidebarAuthBtn').classList.add('logout');
            } catch (e) { window.location.href = '/login?next=/ledger'; }
        }
        function handleAuthClick() {
            const btn = document.getElementById('sidebarAuthBtn');
            if (btn.classList.contains('logout')) {
                fetch('/api/logout', { method: 'POST' }).then(() => window.location.href = '/login');
            } else { window.location.href = '/login?next=/ledger'; }
        }

        // ==================== TOAST ====================
        function showToast(msg, type = 'info') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
        }

        // ==================== AGGREGATOR CRUD ====================
        async function loadAggregators() {
            try {
                const r = await fetch('/api/aggregators');
                if (!r.ok) { showToast('Failed to load aggregators', 'error'); return; }
                const d = await r.json();
                aggregators = d.aggregators || [];
                renderTabs();
                if (aggregators.length > 0) {
                    if (!activeAggId || !aggregators.find(a => a.id === activeAggId)) {
                        activeAggId = aggregators[0].id;
                    }
                    await loadEntries();
                } else {
                    activeAggId = null;
                    renderEmptySheet();
                }
            } catch (e) { console.error('loadAggregators error:', e); showToast('Error loading data', 'error'); }
        }

        async function addAggregator() {
            const name = prompt('Enter aggregator name (e.g. Indigo, Riya, TBO):');
            if (!name || !name.trim()) return;
            const r = await fetch('/api/aggregators', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name.trim() })
            });
            if (r.ok) {
                const a = await r.json();
                activeAggId = a.id;
                showToast(`${a.name} ledger created`, 'success');
                await loadAggregators();
            } else { showToast('Failed to create aggregator', 'error'); }
        }

        async function deleteAggregator(id, name) {
            if (!confirm(`Delete "${name}" and all its entries?`)) return;
            const r = await fetch(`/api/aggregators/${id}`, { method: 'DELETE' });
            if (r.ok) {
                if (activeAggId === id) activeAggId = null;
                showToast(`${name} deleted`, 'success');
                await loadAggregators();
            } else { showToast('Delete failed', 'error'); }
        }

        function selectTab(id) {
            activeAggId = id;
            renderTabs();
            loadEntries();
        }

        // ==================== RENDER TABS ====================
        function renderTabs() {
            const c = document.getElementById('ledgerTabs');
            let html = '';
            aggregators.forEach(a => {
                const active = a.id === activeAggId ? 'active' : '';
                html += `<button class="ledger-tab ${active}" onclick="selectTab('${a.id}')">
                ${a.name}
                <span class="tab-close" onclick="event.stopPropagation(); deleteAggregator('${a.id}', '${a.name}')" title="Delete">✕</span>
            </button>`;
            });
            html += `<button class="add-tab-btn" onclick="addAggregator()">+ New Aggregator</button>`;
            c.innerHTML = html;
        }

        function renderEmptySheet() {
            const topBal = document.getElementById('topBalanceDisplay');
            if (topBal) topBal.style.display = 'none';

            document.getElementById('sheetArea').innerHTML = `
            <div class="empty-sheet">
                <div class="icon">📒</div>
                <p>Create an aggregator to get started</p>
                <button class="add-row-btn" style="margin-top:1.5rem;" onclick="addAggregator()">+ New Aggregator</button>
            </div>`;
        }

        // ==================== ENTRIES ====================
        async function loadEntries() {
            if (!activeAggId) return;
            const r = await fetch(`/api/aggregators/${activeAggId}/entries`);
            const d = await r.json();
            entries = d.entries || [];
            renderSheet();
        }

        function getAggName() {
            const a = aggregators.find(a => a.id === activeAggId);
            return a ? a.name : 'Aggregator';
        }

        function renderSheet() {
            const aggName = getAggName();
            const cols = [
                { key: 'invoice_no', label: 'Invoice No', type: 'text', w: '100px' },
                { key: 'date', label: 'Date', type: 'text', w: '95px' },
                { key: 'pnr', label: 'PNR', type: 'text', w: '80px' },
                { key: 'basic', label: 'Basic', type: 'number', w: '82px' },
                { key: 'k3', label: 'K3', type: 'number', w: '65px' },
                { key: 'other_taxes', label: 'Other Taxes', type: 'number', w: '82px' },
                { key: 'mu', label: 'MU', type: 'number', w: '65px' },
                { key: 'xxd', label: 'XXD', type: 'text', w: '60px' },
                { key: 'ticket_total', label: 'Ticket Total', type: 'computed', w: '90px' },
                { key: 'aggregator_total', label: `${aggName} Total`, type: 'computed', w: '95px' },
                { key: 'running_balance', label: 'Running Balance', type: 'computed', w: '100px' },
                { key: 'booking_by', label: 'Booking By', type: 'select', w: '80px', options: ['', 'AB', 'CK'] },
                { key: 'entry_type', label: 'Type', type: 'text', w: '60px' },
                { key: 'billing', label: 'Billing', type: 'text', w: '90px' },
                { key: 'remarks', label: 'Remarks', type: 'text', w: '120px' },
                { key: 'seat_status', label: 'Seat Status', type: 'text', w: '80px' },
                { key: 'seat_remarks', label: 'Seat Remarks', type: 'text', w: '100px' },
                { key: 'meal_status', label: 'Meal Status', type: 'text', w: '80px' },
            ];

            let th = '<th class="col-sr">#</th>';
            cols.forEach(c => { th += `<th style="min-width:${c.w}">${c.label}</th>`; });
            th += '<th class="col-actions">⋮</th>';

            let tbody = '';
            entries.forEach((e, idx) => {
                let row = `<td class="col-sr">${idx + 1}</td>`;
                cols.forEach(c => {
                    if (c.type === 'computed') {
                        const val = e[c.key] || 0;
                        let cls = 'computed';
                        if (c.key === 'running_balance') {
                            cls += val >= 0 ? ' balance-positive' : ' balance-negative';
                        }
                        row += `<td><span class="${cls}" style="display:block;padding:0.35rem 0.6rem;text-align:right;">${formatNum(val)}</span></td>`;
                    } else if (c.type === 'select') {
                        let ops = '';
                        c.options.forEach(o => {
                            ops += `<option value="${o}" ${e[c.key] === o ? 'selected' : ''}>${o || '—'}</option>`;
                        });
                        row += `<td><select onchange="onCellChange('${e.id}','${c.key}',this.value)">${ops}</select></td>`;
                    } else if (c.type === 'number') {
                        row += `<td><input type="number" value="${e[c.key] || 0}" onchange="onCellChange('${e.id}','${c.key}',this.value)"></td>`;
                    } else {
                        row += `<td><input type="text" value="${escHtml(e[c.key] || '')}" onchange="onCellChange('${e.id}','${c.key}',this.value)"></td>`;
                    }
                });
                row += `<td class="col-actions"><button class="row-delete-btn" onclick="deleteRow('${e.id}')" title="Delete">🗑</button></td>`;
                tbody += `<tr>${row}</tr>`;
            });

            // Totals
            let totalBasic = 0, totalK3 = 0, totalOther = 0, totalMu = 0, totalTicket = 0, totalAgg = 0;
            entries.forEach(e => {
                totalBasic += e.basic || 0;
                totalK3 += e.k3 || 0;
                totalOther += e.other_taxes || 0;
                totalMu += e.mu || 0;
                totalTicket += e.ticket_total || 0;
                totalAgg += e.aggregator_total || 0;
            });

            // Top Balance Display
            if (entries.length > 0) {
                const lastBal = entries[entries.length - 1].running_balance || 0;
                const topBal = document.getElementById('topBalanceDisplay');
                const topAmt = document.getElementById('topBalanceAmount');
                if (topBal && topAmt) {
                    topBal.style.display = 'block';
                    topAmt.textContent = formatNum(lastBal);
                    topAmt.className = lastBal >= 0 ? 'balance-positive' : 'balance-negative';
                }
            } else {
                const topBal = document.getElementById('topBalanceDisplay');
                if (topBal) topBal.style.display = 'none';
            }

            document.getElementById('sheetArea').innerHTML = `
            <div class="sheet-wrapper">
                <table class="sheet-table">
                    <thead><tr>${th}</tr></thead>
                    <tbody>${tbody}</tbody>
                </table>
            </div>
            <div class="sheet-footer">
                <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
                    <button class="add-row-btn" onclick="addRow()">+ Add Row</button>
                    <button class="add-row-btn" style="background:var(--accent-success);" onclick="addFunds()">💰 Add Funds</button>
                </div>
                <div class="sheet-stats">
                    <strong>${entries.length}</strong> entries &nbsp;|&nbsp;
                    Basic: <strong>${formatNum(totalBasic)}</strong> &nbsp;|&nbsp;
                    Ticket Total: <strong>${formatNum(totalTicket)}</strong> &nbsp;|&nbsp;
                    ${aggName} Total: <strong>${formatNum(totalAgg)}</strong>
                </div>
            </div>`;
        }

        async function addFunds() {
            if (!activeAggId) return;
            const amtStr = prompt('Enter Amount to Add to Funds:');
            if (!amtStr) return;
            const amt = parseFloat(amtStr);
            if (isNaN(amt) || amt <= 0) { showToast('Invalid amount', 'error'); return; }

            showToast('Adding funds...', 'info');
            try {
                const today = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }).replace(/ /g, '-');
                const r = await fetch(`/api/aggregators/${activeAggId}/entries`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        entry_type: 'Payment',
                        remarks: 'Funds Added',
                        basic: -amt, // Negative basic = negative aggregator total = increased running balance
                        date: today
                    })
                });
                if (r.ok) {
                    showToast('Funds added', 'success');
                    await loadEntries();
                } else { showToast('Failed to add funds', 'error'); }
            } catch (e) { showToast('Network error', 'error'); }
        }



        // ==================== CELL EDITS ====================
        async function onCellChange(entryId, field, value) {
            // Debounced save
            clearTimeout(saveTimer);
            const payload = {};
            payload[field] = value;
            saveTimer = setTimeout(async () => {
                try {
                    const r = await fetch(`/api/ledger-entries/${entryId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (r.ok) {
                        // Reload entries to get updated computed values
                        await loadEntries();
                    } else { showToast('Save failed', 'error'); }
                } catch (e) { console.error(e); showToast('Network error', 'error'); }
            }, 300);
        }

        // ==================== ADD / DELETE ROW ====================
        async function addRow() {
            if (!activeAggId) return;
            const r = await fetch(`/api/aggregators/${activeAggId}/entries`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ date: new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }).replace(/ /g, '-') })
            });
            if (r.ok) {
                showToast('Row added', 'info');
                await loadEntries();
            } else { showToast('Failed to add row', 'error'); }
        }

        async function deleteRow(entryId) {
            if (!confirm('Delete this entry?')) return;
            const r = await fetch(`/api/ledger-entries/${entryId}`, { method: 'DELETE' });
            if (r.ok) {
                showToast('Row deleted', 'success');
                await loadEntries();
            } else { showToast('Delete failed', 'error'); }
        }

        // ==================== HELPERS ====================
        function formatNum(v) {
            const n = parseFloat(v) || 0;
            return n.toLocaleString('en-IN', { maximumFractionDigits: 0 });
        }
        function escHtml(s) {
            return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // ==================== INIT ====================
        document.addEventListener('DOMContentLoaded', async () => {
            initializeSidebar();
            await checkAuth();
            await loadAggregators();

            // Auto-trigger add funds if deep linked from tickets page
            const params = new URLSearchParams(window.location.search);
            if (params.get('add_funds') === 'true') {
                const targetAggId = params.get('aggregator_id');
                if (targetAggId) {
                    await switchAggregator(targetAggId);
                    // Small delay to ensure aggregator is switched and UI is ready
                    setTimeout(() => addFunds(), 600);
                }
            }
        });
    </script>
</body>

</html>
