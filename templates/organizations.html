<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizations - Super Admin - Time Tours</title>
    <link rel="stylesheet" href="/static/sidebar.css">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --success: #10b981;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex-grow: 1;
            padding: 2rem;
            margin-left: 260px; /* space for sidebar */
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .card {
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .badge-success { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .badge-danger { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .badge-primary { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn:hover { background: var(--primary-hover); }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover { background: var(--surface-hover); }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 50;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal {
            background: var(--surface);
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
        }
    </style>
</head>
<body>
    <div class="layout">
        {% include 'components/sidebar.html' %}
        
        <main class="main-content">
            <div class="header">
                <div>
                    <h1>Organizations</h1>
                    <p style="color: var(--text-muted); margin: 0.25rem 0 0 0;">Platform Super Admin Dashboard</p>
                </div>
            </div>

            <div class="card">
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Organization</th>
                                <th>Type</th>
                                <th>Status</th>
                                <th>Members</th>
                                <th>Limit</th>
                                <th>Joined</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="orgTableBody">
                            <tr><td colspan="7" style="text-align: center;">Loading organizations...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h2 style="margin-top: 0;">Edit Organization</h2>
            <input type="hidden" id="editOrgId">
            <div class="form-group">
                <label>Max Users</label>
                <input type="number" id="editMaxUsers" placeholder="Unlimited (leave blank)">
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="editStatus">
                    <option value="true">Active / Approved</option>
                    <option value="false">Suspended / Pending</option>
                </select>
            </div>
            <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                <button class="btn" style="flex: 1;" onclick="saveOrg()">Save Changes</button>
                <button class="btn btn-outline" style="flex: 1;" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Load user info for sidebar
        async function loadUser() {
            try {
                const r = await fetch('/api/user');
                if (r.ok) {
                    const u = await r.json();
                    document.getElementById('sidebarUserName').textContent = u.full_name || u.username || 'Guest';
                    const handleEl = document.getElementById('sidebarUserHandle');
                    if (handleEl) {
                        const org = u.org_name || '';
                        handleEl.innerHTML = org ? org + '<br><small style="opacity:0.7">@' + u.username + '</small>' : '@' + u.username;
                    }
                    document.getElementById('sidebarAvatar').textContent = (u.full_name || u.username || 'U').charAt(0).toUpperCase();
                    document.getElementById('sidebarAuthBtn').textContent = '🚪 Logout';
                    document.getElementById('sidebarAuthBtn').onclick = async () => { 
                        if (confirm('Logout?')) { 
                            await fetch('/api/logout', { method: 'POST' }); 
                            window.location.href = '/login'; 
                        } 
                    };
                }
            } catch (e) { console.error(e); }
        }

        async function loadOrganizations() {
            try {
                const r = await fetch('/api/organizations');
                if (!r.ok) throw new Error('Failed to fetch');
                const data = await r.json();
                const tbody = document.getElementById('orgTableBody');
                
                if (!data.organizations || data.organizations.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">No organizations found</td></tr>';
                    return;
                }

                tbody.innerHTML = data.organizations.map(org => `
                    <tr>
                        <td>
                            <div style="font-weight: 500;">${org.name}</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted);">${org.slug}</div>
                        </td>
                        <td><span class="badge badge-primary">${org.org_type.replace('_', ' ')}</span></td>
                        <td>
                            ${org.is_approved ? '<span class="badge badge-success">Approved</span>' : '<span class="badge badge-danger">Pending</span>'}
                            ${!org.is_active ? '<span class="badge badge-danger">Inactive</span>' : ''}
                        </td>
                        <td>${org.member_count}</td>
                        <td>${org.max_users === null ? 'Unlimited' : org.max_users}</td>
                        <td style="color: var(--text-muted); font-size: 0.875rem;">${new Date(org.created_at).toLocaleDateString()}</td>
                        <td>
                            <button class="btn btn-outline" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;" 
                                onclick="openModal('${org.id}', ${org.max_users}, ${org.is_approved && org.is_active})">
                                Edit
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error(e);
                document.getElementById('orgTableBody').innerHTML = '<tr><td colspan="7" style="color: #ef4444; text-align: center;">Failed to load organizations</td></tr>';
            }
        }

        function openModal(id, maxUsers, isActive) {
            document.getElementById('editOrgId').value = id;
            document.getElementById('editMaxUsers').value = maxUsers === null ? '' : maxUsers;
            document.getElementById('editStatus').value = isActive ? 'true' : 'false';
            document.getElementById('editModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        async function saveOrg() {
            const id = document.getElementById('editOrgId').value;
            let maxUsers = document.getElementById('editMaxUsers').value;
            maxUsers = maxUsers === '' ? null : parseInt(maxUsers, 10);
            const isActive = document.getElementById('editStatus').value === 'true';

            try {
                const r = await fetch('/api/organizations/' + id, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        max_users: maxUsers,
                        is_approved: isActive,
                        is_active: isActive
                    })
                });
                if (!r.ok) throw new Error('Failed to update');
                closeModal();
                loadOrganizations();
            } catch (e) {
                alert('Error updating organization');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadUser();
            loadOrganizations();
        });
    </script>
</body>
</html>
